<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e"/>
      <stop offset="100%" style="stop-color:#0f1420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- House shape -->
  <polygon points="32,10 52,28 48,28 48,52 16,52 16,28 12,28" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Door -->
  <rect x="26" y="38" width="12" height="14" rx="2" fill="url(#accent)" opacity="0.9"/>
  <!-- Trend arrow inside house -->
  <polyline points="20,44 27,36 33,40 42,30" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="42,30 38,31 41,34" fill="#34d399"/>
</svg>
